<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!--
    Alpha-Gal Syndrome — Simplified Wrist Tattoo
    Designed for temporary tattoo printing (StickerMule, Tattly, Zazzle)
    All black ink for clean transfer; bold strokes for skin readability
    Target size: ~2.5" x 1" on inner wrist
  -->
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- Outer rounded border -->
  <rect x="2" y="2" width="196" height="76" rx="10" ry="10"
        fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- Star of Life (compact, bold) -->
  <g transform="translate(30, 40)">
    <g fill="#000000">
      <rect x="-4" y="-18" width="8" height="36" rx="1"/>
      <rect x="-4" y="-18" width="8" height="36" rx="1" transform="rotate(60)"/>
      <rect x="-4" y="-18" width="8" height="36" rx="1" transform="rotate(120)"/>
    </g>
    <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    <!-- Simplified serpent/staff -->
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#000000" stroke-width="1.5"/>
    <path d="M0,-3.5 C3,-2.5 3,0.5 0,1.5 C-3,2.5 -3,4.5 0,5" fill="none" stroke="#000000" stroke-width="1"/>
  </g>

  <!-- Text block -->
  <text x="58" y="22" font-weight="bold" font-size="12" fill="#000000" letter-spacing="1">ALPHA-GAL</text>
  <text x="58" y="37" font-weight="bold" font-size="10" fill="#000000">ALLERGY</text>
  <line x1="58" y1="42" x2="185" y2="42" stroke="#000000" stroke-width="1.5"/>
  <text x="58" y="55" font-weight="bold" font-size="9" fill="#000000">NO HEPARIN</text>
  <text x="58" y="67" font-weight="bold" font-size="9" fill="#000000">NO MAMMAL-DERIVED MEDS</text>
</svg>
